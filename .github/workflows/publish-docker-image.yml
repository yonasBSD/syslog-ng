name: Publish Docker image

on:
  workflow_call:
    inputs:
      pkg-type:
        required: true
        type: string # stable / nightly
      pkg-version:
        required: false
        type: string # <MAJOR>.<MINOR>.<PATCH>
      pkg-version-lock:
        required: false
        type: string # Exact package version to install (e.g., 4.5.0-1), empty for latest
        description: "Lock to a specific package version (e.g., 4.5.0-1) for reproducible rebuilds (APT or RPM, per pkg-image-type)"
      pkg-image-type:
        required: true
        type: string # deb / rpm
        description: "Packaging flavor: 'deb' (Debian trixie + balabit/syslog-ng) or 'rpm' (AlmaLinux 9 + balabit/syslog-ng-rpm)"
      pkg-push:
        required: false
        type: boolean
        default: true
      update-dockerhub-description:
        required: false
        type: boolean
        default: false
        description: "Update the Docker Hub repository overview (README) from docker/dockerhub-overview-<type>.md"
    secrets:
      dockerhub-username:
        required: true
      dockerhub-password:
        required: true
  workflow_dispatch:
    inputs:
      pkg-type:
        required: true
        type: choice
        options:
          - stable
          - nightly
        description: "Package type to publish"
      pkg-version:
        required: true
        type: string
        description: "syslog-ng version tag (e.g., 4.5.0)"
      pkg-version-lock:
        required: false
        type: string
        description: "Lock to a specific package version (e.g., 4.5.0-1) for reproducible rebuilds (APT or RPM, per pkg-image-type)"
      pkg-image-type:
        required: true
        type: choice
        options:
          - deb
          - rpm
        default: "deb"
        description: "Packaging flavor: 'deb' (Debian trixie + balabit/syslog-ng) or 'rpm' (AlmaLinux 9 + balabit/syslog-ng-rpm)"
      pkg-push:
        required: true
        type: boolean
        default: false
        description: "Push to Docker Hub (uncheck (use false) for testing)"
      update-dockerhub-description:
        required: true
        type: boolean
        default: false
        description: "Update the Docker Hub repository overview (README) from docker/dockerhub-overview-<type>.md"

permissions:
  contents: read
  security-events: write

jobs:
  publish-docker-image:
    name: Publish syslog-ng Docker image (${{ inputs.pkg-image-type }})
    if: github.repository_owner == 'syslog-ng'
    runs-on: ubuntu-latest
    env:
      # Map the public pkg-image-type input to the fixed internal build parameters.
      # Keeping these here (instead of as separate inputs) ensures callers cannot
      # accidentally produce non-shipping combinations.
      DOCKER_IMAGE_NAME: ${{ inputs.pkg-image-type == 'rpm' && 'balabit/syslog-ng-rpm' || 'balabit/syslog-ng' }}
      BASE_IMAGE: ${{ inputs.pkg-image-type == 'rpm' && 'almalinux:9' || 'debian:trixie' }}
    steps:
      - name: Checkout syslog-ng source
        uses: actions/checkout@v4

      - name: Set up Docker
        # Build and load multi-platform images
        # https://docs.docker.com/build/ci/github-actions/multi-platform/#build-and-load-multi-platform-images
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.dockerhub-username || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.dockerhub-password || secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata (syslog-ng version) from current TAG for Docker
        if: inputs.pkg-type == 'stable' && inputs.pkg-version == ''
        id: stable-tags
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: type=match,pattern=syslog-ng-(.*),group=1
          sep-tags: ","

      - name: Extract metadata (syslog-ng version) from the given version TAG for Docker
        if: inputs.pkg-type == 'stable' && inputs.pkg-version != ''
        id: stable-tags-versioned
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: type=match,pattern=syslog-ng-(.*),group=1,value=syslog-ng-${{ inputs.pkg-version }}
          sep-tags: ","

      - name: Compose Docker image tags
        id: tags
        run: |
          if [[ '${{ inputs.pkg-type }}' = 'stable' ]]; then
            if [[ '${{ inputs.pkg-version }}' == '' ]]; then
              TAGS='${{ steps.stable-tags.outputs.tags }}'
            else
              TAGS='${{ steps.stable-tags-versioned.outputs.tags }}'
            fi
          elif [[ '${{ inputs.pkg-type }}' = 'nightly' ]]; then
            TAGS="${DOCKER_IMAGE_NAME}:nightly"
          else
            echo Unexpected input: pkg-type=${{ inputs.pkg-type }}
            false
          fi

          # Split comma-separated tags into an array
          IFS=',' read -ra TAG_ARRAY <<< "$TAGS"

          # Determine cve_input
          if [[ ${#TAG_ARRAY[@]} -eq 1 ]]; then
            CVE_INPUT="${TAG_ARRAY[0]}"
          else
            CVE_INPUT=""
            for TAG in "${TAG_ARRAY[@]}"; do
              if [[ "$TAG" == *:latest ]]; then
                CVE_INPUT="$TAG"
                break
              fi
            done
          fi

          echo "TAGS=$TAGS"
          echo "CVE_INPUT=$CVE_INPUT"

          . .github/workflows/gh-tools.sh
          gh_output TAGS CVE_INPUT

      - name: Set up QEMU
        # Build and load multi-platform images
        # https://docs.docker.com/build/ci/github-actions/multi-platform/#build-and-load-multi-platform-images
        uses: docker/setup-qemu-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/syslog-ng.${{ inputs.pkg-image-type }}.dockerfile
          tags: ${{ steps.tags.outputs.TAGS }}
          platforms: linux/amd64,linux/arm64
          # TODO: Add proper build-args generation
          # This simple task is actually would require a pretty complex change, with a matrix strategy, and merging results of multiple generated images
          # See https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
          # So, as we are lucky, and these required only once, and only in a RUN docker command that can be dynamic
          # now generating these in the ${SRC_ROOT}/docker/syslog-ng.deb.dockerfile based on the runner architecture (platforms: linux/amd64,linux/arm64)
          #build-args: PKG_TYPE=${{ inputs.pkg-type }} BASE_IMAGE=${{ matrix. }} CONTAINER_ARCH=${{ matrix. }} CONTAINER_NAME_SUFFIX=${{ matrix. }}
          build-args: |
            PKG_TYPE=${{ inputs.pkg-type }}
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            PACKAGE_VERSION=${{ inputs.pkg-version-lock || '' }}
          push: ${{ inputs.pkg-push }}

      - name: Scan docker image on CVEs (CRITICAL,HIGH to a sarif file) # https://aquasecurity.github.io/trivy/v0.54/docs/
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tags.outputs.CVE_INPUT }}

          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

          # DO NOT break the build yet if an issue is detected
          #exit-code: '1'

      - name: Scan docker image on CVEs (ALL to a table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tags.outputs.CVE_INPUT }}

          format: "table"
          # TODO: replaced by https://github.com/aquasecurity/trivy-action/tree/master/?tab=readme-ov-file#using-trivy-to-generate-sbom ?!?
          #dependency-tree: true
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
        env:
          # Use the most reliable and quicker AWS ECR location for trivy DBs
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:1

      - name: Upload Trivy scan sarif file results to GitHub Security tab
        if: ${{ inputs.pkg-push != false }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

      - name: Update Docker Hub repository overview
        # Only when actually pushing to Docker Hub AND the caller opted in.
        # The overview file is picked per packaging flavor so balabit/syslog-ng
        # and balabit/syslog-ng-rpm each get their own description.
        if: ${{ inputs.pkg-push != false && inputs.update-dockerhub-description == true }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.dockerhub-username || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.dockerhub-password || secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ env.DOCKER_IMAGE_NAME }}
          readme-filepath: docker/dockerhub-overview-${{ inputs.pkg-image-type }}.md
          short-description: ${{ inputs.pkg-image-type == 'rpm' && 'syslog-ng OSE on AlmaLinux 9 (systemd-managed, all modules included)' || 'syslog-ng OSE on Debian (entrypoint-managed, all modules included)' }}
